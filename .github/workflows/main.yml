name: Next JS Build with Caching & Artifacts

on:
  push:
    branches: [ main ]

jobs:
  optimize-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Download Code
        uses: actions/checkout@v6.0.2

      - name: 2. Setup Node.js Environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x
          cache: 'npm' # Automatically caches standard project dependencies

      # --- THE MAGIC DEV-OPS STEP: CACHING ---
      - name: 3. Check the "Fridge" for Next.js Cache
        uses: actions/cache@v4
        with:
          path: .next/cache # What folder are we saving?
          # A unique key based on the files. If the files didn't change, reuse the cache!
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}

      - name: 4. Build the App
        run: npm run build # Next.js will use the cache here if it exists!

      # --- THE FINISHING STEP: ARTIFACTS ---
      - name: 5. Put Final Build in a Delivery Box
        uses: actions/upload-artifact@v4
        with:
          name: live-website-package # Name of your delivery box
          path: .next/                # What files to put in the box
          retention-days: 7          # Keep the box for 7 days, then delete it to save space
