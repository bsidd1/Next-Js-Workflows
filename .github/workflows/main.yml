name: Next JS Build with Caching & Artifacts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  optimize-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Download Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 🛑 REMOVED: cache: 'npm' (This was causing your error!)

      # --- STEP 3: GENERATE THE APP FIRST ---
      - name: 3. Generate Next.js App
        run: |
          npx create-next-app@latest my-practice-app --ts --eslint --tailwind --src-dir --app --import-alias "@/*" --use-npm

      # --- STEP 4: NOW SET UP THE CACHE ---
      - name: 4. Check the Fridge for Next.js Cache
        uses: actions/cache@v4
        with:
          path: my-practice-app/.next/cache # Pointing directly inside the new app folder
          # We use a custom simple key name because there is no lock file in the root directory
          key: ${{ runner.os }}-nextjs-practice-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-practice-

      - name: 5. Build the App
        run: |
          cd my-practice-app
          npm run build

      - name: 6. Put Final Build in a Delivery Box
        uses: actions/upload-artifact@v4
        with:
          name: live-website-package
          path: my-practice-app/.next/
          retention-days: 1
